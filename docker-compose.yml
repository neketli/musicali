services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    container_name: musicali-app
    restart: unless-stopped
    expose:
      - 3000
    networks:
      - musicali-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  caddy:
    image: caddy:2-alpine
    container_name: musicali-caddy
    restart: unless-stopped
    networks:
      - musicali-network
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
    depends_on:
      - app

networks:
  musicali-network:
    driver: bridge
